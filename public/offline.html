<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - MediGraph</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        color: #e2e8f0;
        font-family: system-ui, sans-serif;
        text-align: center;
        padding: 24px;
      }
      h1 {
        margin-bottom: 16px;
        font-size: 2rem;
      }
      p {
        margin: 0;
        max-width: 420px;
        line-height: 1.6;
      }
      a {
        display: inline-block;
        margin-top: 24px;
        padding: 12px 24px;
        background: #2563eb;
        color: white;
        text-decoration: none;
        border-radius: 9999px;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Offline Mode</h1>
      <p>
        You are offline or the network is unavailable. Some content may still be
        available from the cached app shell.
      </p>
      <a href="/">Go back home</a>
    </div>
  </body>
</html>
